services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: talentbridge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/talentbridge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_this_secret_in_production
      JWT_REFRESH_SECRET: change_this_refresh_secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: your_mailtrap_user
      SMTP_PASS: your_mailtrap_pass
      EMAIL_FROM: noreply@talentbridge.com
      MAX_FILE_SIZE_MB: 5
      NODE_ENV: development
    ports:
      - '5000:5000'
    volumes:
      - resume_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - '80:80'
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  resume_uploads:
